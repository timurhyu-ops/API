<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/">SEARCH</a>
        <a href="/library">MY LIBRARY ({{ session.lib|length if session.lib else 0 }})</a>
    </nav>
    <div class="container">
        <h1>BeatBox Explorer</h1>
        <form method="POST">
            <input type="text" name="query" placeholder="Artist or song..." required>
            <button type="submit" class="btn">DISCOVER</button>
        </form>

        {% if advice %}
            <div class="advice-box">🎵 Mood for today: {{ advice }}</div>
        {% endif %}

        <div class="grid">
            {% for t in tracks %}
            <div class="track-card">
                <img src="{{ t.artworkUrl100 }}" class="track-img">
                <strong>{{ t.trackName }}</strong><br>
                <small>{{ t.artistName }}</small>
                <audio controls src="{{ t.previewUrl }}"></audio>
                <form action="/add" method="POST">
                    <input type="hidden" name="name" value="{{ t.trackName }}">
                    <input type="hidden" name="artist" value="{{ t.artistName }}">
                    <input type="hidden" name="img" value="{{ t.artworkUrl100 }}">
                    <button type="submit" class="btn" style="width:100%; margin-top:10px; background:#333">✚ ADD</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
